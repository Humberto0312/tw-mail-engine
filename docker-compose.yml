# Despliegue del motor en el VPS. Lo gestiona Claude por SSH:
#   docker compose up -d --build
#
# network_mode: host  → el motor usa la red del host directamente. Es CLAVE
# para un MTA: salida por el puerto 25 con la IP del servidor y, a futuro,
# bind de IP de origen por cliente (pool de IPs). Sin NAT de Docker en medio.
services:
  mongo:
    image: mongo:7
    container_name: tw-mail-mongo
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - ./data/mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1})"]
      interval: 5s
      timeout: 5s
      retries: 12

  engine:
    build: .
    container_name: tw-mail-engine
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./keys:/keys:ro
    depends_on:
      mongo:
        condition: service_healthy
